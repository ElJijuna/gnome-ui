name: Deploy Storybook

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-core:
    name: Build @gnome-ui/core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: |
            packages/core/src/tokens.css
            packages/core/src/tokens.d.ts

  build-icons:
    name: Build @gnome-ui/icons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build --workspace=packages/icons

      - uses: actions/upload-artifact@v4
        with:
          name: icons-dist
          path: packages/icons/dist/

  build-react:
    name: Build @gnome-ui/react
    needs: build-icons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: icons-dist
          path: packages/icons/dist

      - run: npm run build --workspace=packages/react

      - uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: packages/react/dist/

  build-storybook:
    name: Build Storybook
    needs: [build-core, build-icons, build-react]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: icons-dist
          path: packages/icons/dist

      - name: Build Storybook
        run: npm run build-storybook --workspace packages/react

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/react/storybook-static

  deploy:
    name: Deploy to GitHub Pages
    needs: build-storybook
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
