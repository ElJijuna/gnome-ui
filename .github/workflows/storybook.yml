name: Deploy Storybook

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-core:
    name: Build @gnome-ui/core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: |
            packages/core/src/tokens.css
            packages/core/src/tokens.d.ts

  build-icons:
    name: Build @gnome-ui/icons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build --workspace=packages/icons

      - uses: actions/upload-artifact@v4
        with:
          name: icons-dist
          path: packages/icons/dist/

  build-react:
    name: Build @gnome-ui/react
    needs: build-icons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: icons-dist
          path: packages/icons/dist

      - run: npm run build --workspace=packages/react

      - uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: packages/react/dist/

  build-charts:
    name: Build @gnome-ui/charts
    needs: build-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build --workspace=packages/charts

      - uses: actions/upload-artifact@v4
        with:
          name: charts-dist
          path: packages/charts/dist/

  build-storybook-react:
    name: Build Storybook (@gnome-ui/react)
    needs: [build-core, build-icons, build-react]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: icons-dist
          path: packages/icons/dist

      - name: Build Storybook
        run: npm run build-storybook --workspace packages/react

      - uses: actions/upload-artifact@v4
        with:
          name: storybook-react
          path: packages/react/storybook-static/

  build-storybook-layout:
    name: Build Storybook (@gnome-ui/layout)
    needs: [build-core, build-icons, build-react]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: icons-dist
          path: packages/icons/dist

      - uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: packages/react/dist

      - name: Build Storybook
        run: npm run build-storybook --workspace packages/layout

      - uses: actions/upload-artifact@v4
        with:
          name: storybook-layout
          path: packages/layout/storybook-static/

  build-storybook-charts:
    name: Build Storybook (@gnome-ui/charts)
    needs: [build-core, build-charts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: charts-dist
          path: packages/charts/dist

      - name: Build Storybook
        run: npm run build-storybook --workspace packages/charts

      - uses: actions/upload-artifact@v4
        with:
          name: storybook-charts
          path: packages/charts/storybook-static/

  combine-and-deploy:
    name: Combine & Deploy to GitHub Pages
    needs: [build-storybook-react, build-storybook-layout, build-storybook-charts]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: storybook-react
          path: site/

      - uses: actions/download-artifact@v4
        with:
          name: storybook-layout
          path: site/layout/

      - uses: actions/download-artifact@v4
        with:
          name: storybook-charts
          path: site/charts/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
