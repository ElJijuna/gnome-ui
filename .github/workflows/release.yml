name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── 1. Build all packages ──────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            packages/core/src/tokens.css
            packages/core/src/tokens.d.ts
            packages/icons/dist/
            packages/react/dist/
            packages/charts/dist/
            packages/platform/dist/
            packages/hooks/dist/
            packages/layout/dist/

  # ── 2a. Release @gnome-ui/core ─────────────────────────────────────────────
  release-core:
    name: Release @gnome-ui/core
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Release
        working-directory: packages/core
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

  # ── 2b. Release @gnome-ui/icons ────────────────────────────────────────────
  release-icons:
    name: Release @gnome-ui/icons
    needs: release-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Build @gnome-ui/icons
        run: npm run build --workspace=packages/icons

      - name: Release
        working-directory: packages/icons
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

  # ── 2c. Release @gnome-ui/charts ──────────────────────────────────────────
  release-charts:
    name: Release @gnome-ui/charts
    needs: release-icons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Build @gnome-ui/charts
        run: npm run build --workspace=packages/charts

      - name: Release
        working-directory: packages/charts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

  # ── 2d. Release @gnome-ui/platform ───────────────────────────────────────
  release-platform:
    name: Release @gnome-ui/platform
    needs: release-charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Build @gnome-ui/platform
        run: npm run build --workspace=packages/platform

      - name: Release
        working-directory: packages/platform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

  # ── 2e. Release @gnome-ui/hooks ───────────────────────────────────────────
  release-hooks:
    name: Release @gnome-ui/hooks
    needs: release-platform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Build @gnome-ui/platform
        run: npm run build --workspace=packages/platform

      - name: Build @gnome-ui/hooks
        run: npm run build --workspace=packages/hooks

      - name: Release
        working-directory: packages/hooks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

  # ── 2f. Release @gnome-ui/layout ─────────────────────────────────────────
  release-layout:
    name: Release @gnome-ui/layout
    needs: [release-charts, release-hooks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Build @gnome-ui/icons
        run: npm run build --workspace=packages/icons

      - name: Build @gnome-ui/platform
        run: npm run build --workspace=packages/platform

      - name: Build @gnome-ui/hooks
        run: npm run build --workspace=packages/hooks

      - name: Build @gnome-ui/react
        run: npm run build --workspace=packages/react

      - name: Build @gnome-ui/layout
        run: npm run build --workspace=packages/layout

      - name: Release
        working-directory: packages/layout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release

  # ── 3. Release @gnome-ui/react (after icons + charts + hooks + layout) ───
  release-react:
    name: Release @gnome-ui/react
    needs: [release-icons, release-hooks, release-layout]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .

      - name: Build @gnome-ui/icons
        run: npm run build --workspace=packages/icons

      - name: Build @gnome-ui/react
        run: npm run build --workspace=packages/react

      - name: Release
        working-directory: packages/react
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
